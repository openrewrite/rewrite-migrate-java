---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.UpgradeToJava25
displayName: Migrate to Java 25
description: >-
  This recipe will apply changes commonly needed when migrating to Java 25. This recipe will also replace deprecated API
  with equivalents when there is a clear migration strategy. Build files will also be updated to use Java 25 as the
  target/source and plugins will be also be upgraded to versions that are compatible with Java 25.
tags:
  - java25
preconditions:
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.migrate.UpgradeToJava21
  - org.openrewrite.java.migrate.UpgradeBuildToJava24
  - org.openrewrite.java.migrate.UpgradeBuildToJava25
  - org.openrewrite.java.migrate.UpgradeBuildToJava25ForKotlin
  - org.openrewrite.java.migrate.UpgradePluginsForJava25
  - org.openrewrite.java.migrate.io.ReplaceSystemOutWithIOPrint
  - org.openrewrite.java.migrate.lang.MigrateMainMethodToInstanceMain
  - org.openrewrite.java.migrate.lang.MigrateProcessWaitForDuration
  - org.openrewrite.java.migrate.lang.ReplaceUnusedVariablesWithUnderscore
  - org.openrewrite.java.migrate.util.MigrateInflaterDeflaterToClose
  - org.openrewrite.java.migrate.util.MigrateStringReaderToReaderOf
  - org.openrewrite.java.migrate.AccessController
  - org.openrewrite.java.migrate.RemoveSecurityPolicy
  - org.openrewrite.java.migrate.RemoveSecurityManager
  - org.openrewrite.java.migrate.SystemGetSecurityManagerToNull
  - org.openrewrite.java.migrate.MigrateZipErrorToZipException
  - org.openrewrite.java.migrate.MigrateGraalVMResourceConfig

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.util.MigrateInflaterDeflaterToClose
displayName: Replace `Inflater` and `Deflater` `end()` calls with `close()`
description: >-
  Replace `end()` method calls with `close()` method calls for `Inflater` and `Deflater` classes in Java 25+, as they now implement AutoCloseable.
preconditions:
  - org.openrewrite.java.search.HasJavaVersion:
      version: "[25,)"
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: java.util.zip.Deflater end()
      newMethodName: close
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: java.util.zip.Inflater end()
      newMethodName: close

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.AccessController
displayName: Remove Security AccessController
description: The Security Manager API is unsupported in Java 24. This recipe will remove the usage of `java.security.AccessController`.
tags:
  - java25
  - security
  - deprecation
preconditions:
  - org.openrewrite.java.search.HasJavaVersion:
      version: "[25,)"
  - org.openrewrite.java.search.FindMethods:
      methodPattern: java.security.AccessController#checkPermission(..)
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.RemoveMethodInvocations:
      methodPattern: java.security.AccessController#checkPermission(..)
  - org.openrewrite.staticanalysis.UnnecessaryCatch
  - org.openrewrite.staticanalysis.UnnecessaryThrows

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.RemoveSecurityPolicy
displayName: Remove Security Policy
description: The Security Manager API is unsupported in Java 24. This recipe will remove the use of `java.security.Policy`.
tags:
  - java25
  - security
  - deprecation
preconditions:
  - org.openrewrite.java.search.HasJavaVersion:
      version: "[25,)"
  - org.openrewrite.java.search.FindMethods:
      methodPattern: java.security.Policy#setPolicy(..)
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.RemoveMethodInvocations:
      methodPattern: java.security.Policy#setPolicy(..)
  - org.openrewrite.staticanalysis.UnnecessaryCatch
  - org.openrewrite.staticanalysis.UnnecessaryThrows

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.RemoveSecurityManager
displayName: Remove Security SecurityManager
description: The Security Manager API is unsupported in Java 24. This recipe will remove the usage of `java.security.SecurityManager`.
tags:
  - java25
  - security
  - deprecation
preconditions:
  - org.openrewrite.java.search.HasJavaVersion:
      version: "[25,)"
  - org.openrewrite.java.search.FindMethods:
      methodPattern: java.lang.SecurityManager#check*(..)
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.RemoveMethodInvocations:
      methodPattern: java.lang.SecurityManager#check*(..)
  - org.openrewrite.staticanalysis.UnnecessaryCatch
  - org.openrewrite.staticanalysis.UnnecessaryThrows

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.SystemGetSecurityManagerToNull
displayName: Replace `System.getSecurityManager()` with `null`
description: >-
    The Security Manager API is unsupported in Java 24. This recipe will replace `System.getSecurityManager()` with `null`
    to make its behavior more obvious and try to simplify execution paths afterwards.
tags:
  - java25
  - security
  - deprecation
preconditions:
  - org.openrewrite.java.search.HasJavaVersion:
      version: "[25,)"
  - org.openrewrite.java.search.FindMethods:
      methodPattern: java.lang.System#getSecurityManager()
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.java.ReplaceMethodInvocationWithConstant:
      methodPattern: java.lang.System#getSecurityManager()
      replacement: "null"
  - org.openrewrite.staticanalysis.SimplifyConstantIfBranchExecution

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.MigrateZipErrorToZipException
displayName: Use `ZipException` instead of `ZipError`
description: Use `ZipException` instead of the deprecated `ZipError` in Java 9 or higher.
preconditions:
  - org.openrewrite.java.search.HasJavaVersion:
      version: "[25,)"
  - org.openrewrite.Singleton
recipeList:
   - org.openrewrite.java.ChangeType:
       oldFullyQualifiedTypeName: java.util.zip.ZipError
       newFullyQualifiedTypeName: java.util.zip.ZipException

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.EnableLombokAnnotationProcessor
displayName: Enable Lombok annotation processor
description: >-
  With Java 23 the encapsulation of JDK internals made it necessary to configure annotation processors like Lombok explicitly.
  The change is valid for older versions as well.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.projectlombok
      artifactIdPattern: lombok
recipeList:
  - org.openrewrite.maven.AddAnnotationProcessor:
      groupId: org.projectlombok
      artifactId: lombok
      version: 1.18.40
  - org.openrewrite.gradle.AddDependency:
      groupId: org.projectlombok
      artifactId: lombok
      version: "[1.18.40)"
      configuration: annotationProcessor
      onlyIfUsing: lombok.*

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.UpgradePluginsForJava25
displayName: Upgrade plugins to Java 25 compatible versions
description: Updates plugins and dependencies to versions compatible with Java 25.
tags:
  - java25
preconditions:
  - org.openrewrite.Singleton
recipeList:
  - org.openrewrite.github.SetupJavaUpgradeJavaVersion:
      minimumJavaMajorVersion: 25
  - org.openrewrite.gradle.UpdateGradleWrapper:
      version: 9.1.0
      addIfMissing: false
  - org.openrewrite.maven.UpgradePluginVersion:
      groupId: org.apache.maven.plugins
      artifactId: maven-compiler-plugin
      newVersion: 3.15.x
      addVersionIfMissing: true
  - org.openrewrite.maven.UpgradePluginVersion:
      groupId: org.apache.maven.plugins
      artifactId: maven-surefire-*
      newVersion: 3.5.x
  - org.openrewrite.maven.UpgradePluginVersion:
      groupId: org.apache.maven.plugins
      artifactId: maven-failsafe-plugin
      newVersion: 3.5.x
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: net.bytebuddy
      artifactId: byte-buddy*
      newVersion: 1.17.x
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mockito
      artifactId: mockito-*
      newVersion: 5.17.x
  - org.openrewrite.java.migrate.AddSurefireFailsafeArgLineForMockito

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.AddSurefireFailsafeArgLineForMockito
displayName: Add surefire `--add-opens` for Mockito/ByteBuddy
description: >-
  Adds `--add-opens` JVM arguments required by Mockito and ByteBuddy to the Maven Surefire and Failsafe plugin
  `argLine` configuration. Only applied when the project depends on Mockito.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.mockito
      artifactIdPattern: mockito-*
recipeList:
  - org.openrewrite.java.migrate.AddSurefireFailsafeArgLine:
      argLine: >-
        --add-opens java.base/java.lang=ALL-UNNAMED
        --add-opens java.base/java.lang.reflect=ALL-UNNAMED
        --add-opens java.base/jdk.internal.misc=ALL-UNNAMED
        --add-opens java.base/jdk.internal.reflect=ALL-UNNAMED
        -Dnet.bytebuddy.experimental=true

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.UpgradeBuildToJava24
displayName: Upgrade build to Java 24 for Kotlin pre-2.3
description: >-
  Kotlin versions before 2.3 only support up to Java 24. Applies only to modules that actually compile Kotlin
  (i.e. contain `.kt` source files), so transitive `kotlin-stdlib` dependencies do not trigger the cap.
preconditions:
  - org.openrewrite.java.migrate.search.ModuleHasKotlinSource
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.jetbrains.kotlin
      artifactIdPattern: kotlin-stdlib*
      version: "[0,2.3)"
recipeList:
  - org.openrewrite.java.migrate.UpgradeJavaVersion:
      version: 24

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.UpgradeBuildToJava25
displayName: Upgrade build to Java 25 (non-Kotlin)
description: >-
  Upgrades build files to Java 25 for modules without Kotlin source files. This covers pure Java projects,
  including those that only pick up `kotlin-stdlib` transitively through another dependency.
preconditions:
  - org.openrewrite.java.migrate.search.ModuleHasKotlinSource:
      invertMarking: true
recipeList:
  - org.openrewrite.java.migrate.UpgradeJavaVersion:
      version: 25

---
type: specs.openrewrite.org/v1beta/recipe
name: org.openrewrite.java.migrate.UpgradeBuildToJava25ForKotlin
displayName: Upgrade build to Java 25 for Kotlin 2.3+
description: >-
  Upgrades build files to Java 25 for Kotlin modules already on Kotlin 2.3 or later.
preconditions:
  - org.openrewrite.java.migrate.search.ModuleHasKotlinSource
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.jetbrains.kotlin
      artifactIdPattern: kotlin-stdlib*
      version: "[0,2.3)"
      invertMarking: true
recipeList:
  - org.openrewrite.java.migrate.UpgradeJavaVersion:
      version: 25
